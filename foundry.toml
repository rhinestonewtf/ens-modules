[profile.default]
#evm_version = "cancun"
evm_version = "prague"
ffi = true
src = "src"
out = "out"
via-ir = true
cbor_metadata = true
gas_reports = ["Router", "TheComact", "SameChainRoute", "SameChainArbiter"]
script = "script"
libs = ["node_modules", "lib"]
fs_permissions = [{ access = "read", path = "artifacts" }, { access = "read-write", path = "gas_calculations" }, { access = "read-write", path = "./script/deployments" }, { access = "read", path = "./script" }, { access = "read", path = "." }]
allow_paths = ["*", "/"]
gas_limit = "18446744073709551615"
memory_limit = 2147483648
optimizer_runs = 10000
verbosity = 3
solc = "0.8.30"
auto_detect_solc = false
#optimizer_runs = 100
bytecode_hash = 'none'
#extra_output_files = ["irOptimized"]
ignored_warnings_from = ["node_modules", "test"]

# NOTE: use this profile to build the actual modules, reduces code size
[profile.release]
optimizer_runs = 500
bytecode_hash = 'none'

[profile.default.invariant]
  call_override = false # Override unsafe external calls to perform reentrancy checks
  depth = 10            # Number of calls executed in one run
  fail_on_revert = true
  runs = 50

# Speed up compilation and tests during development
[profile.lite]
  optimizer = false

